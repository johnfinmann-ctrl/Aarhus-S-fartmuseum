<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingen forbindelse – Aarhus Søfartsmuseum</title>
<style>
  :root{--navy:#0b2438;--sand:#e8dcc4;--sand-light:#f6f1e6;--red:#a13d3d;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Trebuchet MS',sans-serif;background:var(--navy);color:var(--sand-light);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
  .icon{font-size:4rem;margin-bottom:24px;opacity:.7;}
  h1{font-size:1.8rem;color:var(--sand);margin-bottom:12px;}
  p{font-size:1rem;color:rgba(246,241,230,.7);max-width:420px;margin:0 auto 24px;line-height:1.6;}
  .btn{display:inline-block;padding:13px 28px;background:var(--red);color:#fff;border-radius:2px;text-decoration:none;font-weight:bold;font-size:.95rem;border:none;cursor:pointer;transition:background .2s;}
  .btn:hover{background:#8c3232;}
  .contact{margin-top:32px;font-size:.88rem;color:rgba(246,241,230,.5);}
  .contact a{color:var(--sand);text-decoration:none;}
</style>
</head>
<body>
<div class="icon">⚓</div>
<h1>Ingen internetforbindelse</h1>
<p>Det ser ud til, at du ikke har forbindelse til internettet lige nu. Prøv igen, når du er online.</p>
<button class="btn" onclick="window.location.reload()">Prøv igen</button>
<div class="contact">
  <p>Aarhus Søfartsmuseum · <a href="tel:60641816">60 64 18 16</a> · <a href="mailto:a.dam@suu.dk">a.dam@suu.dk</a></p>
</div>
</body>
</html>
